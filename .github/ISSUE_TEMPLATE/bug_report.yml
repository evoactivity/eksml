---
name: Bug Report
description: Report a bug in Eksml
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal code or steps to reproduce the issue.
      render: typescript
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Eksml Version
      placeholder: '0.1.0'
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Node version, runtime, OS, etc.
      placeholder: 'Node 22.0.0, macOS 15'
