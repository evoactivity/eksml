<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eksml - Fast Stream (SAX) Example</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #0e0e10;
    color: #e0e0e0;
    padding: 24px;
    min-height: 100vh;
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 600;
    margin-bottom: 4px;
    color: #fff;
  }

  .subtitle {
    font-size: 0.85rem;
    color: #888;
    margin-bottom: 20px;
  }

  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .controls label {
    font-size: 0.8rem;
    color: #aaa;
  }

  select, button, input[type="number"] {
    font-family: inherit;
    font-size: 0.8rem;
    padding: 6px 12px;
    border: 1px solid #333;
    border-radius: 6px;
    background: #1a1a1e;
    color: #e0e0e0;
    cursor: pointer;
  }

  input[type="number"] {
    width: 80px;
    cursor: text;
  }

  select:hover, button:hover {
    border-color: #555;
  }

  button.primary {
    background: #2563eb;
    border-color: #2563eb;
    color: #fff;
    font-weight: 600;
  }

  button.primary:hover { background: #1d4ed8; }

  button.danger {
    background: #dc2626;
    border-color: #dc2626;
    color: #fff;
    font-weight: 600;
  }

  button.danger:hover { background: #b91c1c; }

  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .panes {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    height: calc(100vh - 160px);
    min-height: 400px;
  }

  .pane {
    display: flex;
    flex-direction: column;
    background: #16161a;
    border: 1px solid #2a2a2e;
    border-radius: 8px;
    overflow: hidden;
  }

  .pane-header {
    padding: 10px 14px;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #888;
    background: #1a1a1e;
    border-bottom: 1px solid #2a2a2e;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .pane-header .stats {
    font-weight: 400;
    color: #6b7280;
    text-transform: none;
    letter-spacing: normal;
  }

  textarea {
    flex: 1;
    width: 100%;
    padding: 14px;
    font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
    font-size: 0.82rem;
    line-height: 1.5;
    background: transparent;
    color: #e0e0e0;
    border: none;
    outline: none;
    resize: none;
    tab-size: 2;
  }

  textarea:focus { background: #18181c; }

  .log-area {
    flex: 1;
    overflow-y: auto;
    padding: 0;
    font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
    font-size: 0.78rem;
    line-height: 1.6;
  }

  .log-entry {
    padding: 2px 14px;
    border-bottom: 1px solid #1e1e22;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .log-entry:hover { background: #1c1c20; }

  .log-entry.chunk-marker {
    background: #1a1a2e;
    color: #6366f1;
    font-weight: 600;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 4px 14px;
  }

  .event-tag { font-weight: 600; }
  .event-opentag .event-tag { color: #34d399; }
  .event-closetag .event-tag { color: #f87171; }
  .event-text .event-tag { color: #fbbf24; }
  .event-cdata .event-tag { color: #a78bfa; }
  .event-comment .event-tag { color: #6b7280; }
  .event-pi .event-tag { color: #38bdf8; }
  .event-done .event-tag { color: #6366f1; }

  .event-detail { color: #9ca3af; }
  .event-value { color: #e0e0e0; }

  .progress-bar {
    height: 3px;
    background: #2a2a2e;
    overflow: hidden;
  }

  .progress-bar .fill {
    height: 100%;
    width: 0%;
    background: #2563eb;
    transition: width 0.1s ease;
  }
</style>
</head>
<body>

<h1>eksml &mdash; Fast Stream (SAX)</h1>
<p class="subtitle">Feeds XML to the SAX parser chunk-by-chunk with configurable throttle and chunk size.</p>

<div class="controls">
  <label for="throttle">Throttle</label>
  <select id="throttle">
    <option value="0">No delay</option>
    <option value="16">16 ms (60 fps)</option>
    <option value="50">50 ms</option>
    <option value="100" selected>100 ms</option>
    <option value="250">250 ms</option>
    <option value="500">500 ms</option>
    <option value="1000">1000 ms</option>
  </select>

  <label for="chunk-size">Chunk size (bytes)</label>
  <input type="number" id="chunk-size" value="64" min="1" max="100000">

  <button class="primary" id="start-btn">Stream</button>
  <button class="danger" id="stop-btn" disabled>Stop</button>
</div>

<div class="panes">
  <div class="pane">
    <div class="pane-header">Input XML</div>
    <textarea id="input" spellcheck="false"><?xml version="1.0" encoding="UTF-8"?>
<catalog>
  <product id="p1" category="electronics">
    <name>Wireless Mouse</name>
    <description><![CDATA[A smooth & responsive <wireless> mouse]]></description>
    <price currency="USD">29.99</price>
    <specs>
      <weight unit="g">85</weight>
      <battery>AA</battery>
      <connectivity>2.4GHz</connectivity>
    </specs>
    <tags>
      <tag>peripheral</tag>
      <tag>wireless</tag>
      <tag>ergonomic</tag>
    </tags>
  </product>
  <product id="p2" category="accessories">
    <name>USB-C Hub</name>
    <description>Multi-port adapter with HDMI &amp; USB 3.0</description>
    <price currency="USD">49.99</price>
    <specs>
      <ports>7</ports>
      <weight unit="g">120</weight>
    </specs>
    <!-- Popular item -->
    <tags>
      <tag>adapter</tag>
      <tag>usb-c</tag>
    </tags>
  </product>
  <product id="p3" category="electronics">
    <name>Mechanical Keyboard</name>
    <description>Cherry MX Blue switches, full RGB</description>
    <price currency="EUR">89.00</price>
    <specs>
      <switches>Cherry MX Blue</switches>
      <layout>TKL</layout>
      <weight unit="g">750</weight>
    </specs>
    <tags>
      <tag>keyboard</tag>
      <tag>mechanical</tag>
      <tag>rgb</tag>
    </tags>
  </product>
</catalog></textarea>
  </div>

  <div class="pane">
    <div class="pane-header">
      <span>Events</span>
      <span class="stats" id="stats"></span>
    </div>
    <div class="progress-bar"><div class="fill" id="progress"></div></div>
    <div class="log-area" id="log"></div>
  </div>
</div>

<script type="module" src="./fast-stream.ts"></script>

</body>
</html>
