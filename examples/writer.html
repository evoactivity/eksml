<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eksml - Writer Example</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #0e0e10;
    color: #e0e0e0;
    padding: 24px;
    min-height: 100vh;
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 600;
    margin-bottom: 4px;
    color: #fff;
  }

  .subtitle {
    font-size: 0.85rem;
    color: #888;
    margin-bottom: 20px;
  }

  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .controls label {
    font-size: 0.8rem;
    color: #aaa;
  }

  select, button {
    font-family: inherit;
    font-size: 0.8rem;
    padding: 6px 12px;
    border: 1px solid #333;
    border-radius: 6px;
    background: #1a1a1e;
    color: #e0e0e0;
    cursor: pointer;
  }

  select:hover, button:hover {
    border-color: #555;
  }

  button.primary {
    background: #2563eb;
    border-color: #2563eb;
    color: #fff;
    font-weight: 600;
  }

  button.primary:hover {
    background: #1d4ed8;
  }

  .panes {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    height: calc(100vh - 160px);
    min-height: 400px;
  }

  .pane {
    display: flex;
    flex-direction: column;
    background: #16161a;
    border: 1px solid #2a2a2e;
    border-radius: 8px;
    overflow: hidden;
  }

  .pane-header {
    padding: 10px 14px;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #888;
    background: #1a1a1e;
    border-bottom: 1px solid #2a2a2e;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .pane-header .timing {
    font-weight: 400;
    color: #6b7280;
    text-transform: none;
    letter-spacing: normal;
  }

  .editor-container {
    flex: 1;
    min-height: 0;
  }

  .error-overlay {
    position: absolute;
    inset: 0;
    padding: 14px;
    font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
    font-size: 0.82rem;
    line-height: 1.5;
    color: #ef4444;
    background: #16161a;
    overflow: auto;
    white-space: pre-wrap;
    word-break: break-word;
    z-index: 10;
  }

  .tabs {
    display: flex;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .tabs::-webkit-scrollbar {
    display: none;
  }

  .tab {
    font-family: inherit;
    font-size: 0.72rem;
    font-weight: 500;
    padding: 6px 14px;
    border: none;
    border-bottom: 2px solid transparent;
    border-radius: 0;
    background: transparent;
    color: #666;
    cursor: pointer;
    white-space: nowrap;
  }

  .tab:hover {
    color: #aaa;
    background: #1a1a1e;
  }

  .tab.active {
    color: #e0e0e0;
    background: #16161a;
    border-bottom-color: #2563eb;
  }
</style>
</head>
<body>

<h1>eksml &mdash; Writer</h1>
<p class="subtitle">Enter JSON (DOM, lossy, or lossless) on the left, see serialized XML on the right.</p>

<div class="controls">
  <label for="format">Input format</label>
  <select id="format">
    <option value="dom" selected>DOM (TNode[])</option>
    <option value="lossy">Lossy</option>
    <option value="lossless">Lossless</option>
  </select>

  <label for="pretty">
    <input type="checkbox" id="pretty"> Pretty-print
  </label>

  <label for="entities">
    <input type="checkbox" id="entities"> Encode entities
  </label>

  <label for="html">
    <input type="checkbox" id="html"> HTML mode
  </label>

  <button class="primary" id="write-btn">Write</button>
</div>

<div class="panes">
  <div class="pane">
    <div class="pane-header">Input JSON</div>
    <div class="tabs" id="tabs"></div>
    <div class="editor-container" id="input-editor"></div>
  </div>

  <div class="pane" style="position: relative;">
    <div class="pane-header">
      <span>Output XML</span>
      <span class="timing" id="timing"></span>
    </div>
    <div class="editor-container" id="output-editor"></div>
    <div class="error-overlay" id="error-overlay" hidden></div>
  </div>
</div>

<script type="module" src="./writer.ts"></script>

</body>
</html>
