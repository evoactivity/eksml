<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>eksml - Transform Stream Example</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .log-entry.node-element {
        border-left: 3px solid #34d399;
      }
      .log-entry.node-text {
        border-left: 3px solid #fbbf24;
      }
      .log-entry.node-done {
        border-left: 3px solid #6366f1;
      }

      .node-tag {
        color: #34d399;
        font-weight: 600;
      }
      .node-attr-key {
        color: #a78bfa;
      }
      .node-attr-val {
        color: #fbbf24;
      }
      .node-text-val {
        color: #fbbf24;
      }
      .node-children {
        color: #6b7280;
        font-size: 0.72rem;
      }
      .node-json {
        color: #9ca3af;
      }

      .collapsible {
        cursor: pointer;
        user-select: none;
      }

      .collapsible .json-body {
        display: none;
        margin-top: 4px;
        padding-left: 12px;
        border-left: 1px solid #2a2a2e;
        color: #9ca3af;
        font-size: 0.75rem;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .collapsible.expanded .json-body {
        display: block;
      }

      .expand-hint {
        color: #555;
        font-size: 0.7rem;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <h1>eksml &mdash; Transform Stream</h1>
    <p class="subtitle">
      Feeds XML chunks through a Web TransformStream, emitting complete TNode
      subtrees as they close.
    </p>

    <div class="controls">
      <label for="throttle">Throttle</label>
      <select id="throttle">
        <option value="0">No delay</option>
        <option value="16">16 ms (60 fps)</option>
        <option value="50">50 ms</option>
        <option value="100" selected>100 ms</option>
        <option value="250">250 ms</option>
        <option value="500">500 ms</option>
        <option value="1000">1000 ms</option>
      </select>

      <label for="chunk-size">Chunk size (bytes)</label>
      <input type="number" id="chunk-size" value="64" min="1" max="100000" />

      <label for="select-tags">Select</label>
      <input
        type="text"
        id="select-tags"
        placeholder="e.g. book, author"
        spellcheck="false"
        title="Comma-separated tag names to emit (leave empty for default top-level emission)"
      />

      <button class="primary" id="start-btn">Stream</button>
      <button class="danger" id="stop-btn" disabled>Stop</button>
    </div>

    <div class="panes">
      <div class="pane">
        <div class="pane-header">Input XML</div>
        <div class="editor-container" id="input-editor"></div>
      </div>

      <div class="pane">
        <div class="pane-header">
          <span>Emitted Nodes</span>
          <span class="stats" id="stats"></span>
        </div>
        <div class="progress-bar"><div class="fill" id="progress"></div></div>
        <div class="log-area" id="log"></div>
      </div>
    </div>

    <script type="module" src="./transform-stream.ts"></script>
  </body>
</html>
