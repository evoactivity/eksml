<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>eksml - Parse Example</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      .timing.benching {
        animation: pulse 0.8s ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <h1>eksml &mdash; Parse</h1>
    <p class="subtitle">
      Enter XML on the left, see parsed output on the right.
    </p>

    <div class="controls">
      <label for="mode">Output mode</label>
      <select id="mode">
        <option value="dom" selected>DOM (TNode[])</option>
        <option value="lossy">Lossy</option>
        <option value="lossless">Lossless</option>
      </select>

      <label for="entities">
        <input type="checkbox" id="entities" /> Decode entities
      </label>

      <label for="html"> <input type="checkbox" id="html" /> HTML mode </label>

      <label for="bench"> <input type="checkbox" id="bench" /> Bench </label>

      <button class="primary" id="parse-btn">Parse</button>
    </div>

    <div class="panes">
      <div class="pane">
        <div class="pane-header">Input XML</div>
        <div class="tabs" id="tabs"></div>
        <div class="editor-container" id="input-editor"></div>
      </div>

      <div class="pane" style="position: relative">
        <div class="pane-header">
          <span>Output</span>
          <span class="timing" id="timing"></span>
        </div>
        <div class="editor-container" id="output-editor"></div>
        <div class="error-overlay" id="error-overlay" hidden></div>
      </div>
    </div>

    <script type="module" src="./parse.ts"></script>
  </body>
</html>
